name: Continuous Integration

# 1. Trigger the workflow on pushes or pull requests to the main branch.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 2. Define Jobs to Run

jobs:
  test-python-code:
    # Use a standard ubuntu runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your repository's code into the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Stepb B: Install python on the runner
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      # Step C: Install dependencies (Flask and Flake8 for linting)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [-f app/requirements.txt ]; then pip install -r app/requirements.txt; fi
      # Step D: Run the linter to check for  syntax errors
      - name: Lint with Flake8
        run: |
          # Stop the build if there are python syntax errors or undefined names.
          flake8 app/ --count --select=E9, F63, F7, F82 --show-source --statistics
